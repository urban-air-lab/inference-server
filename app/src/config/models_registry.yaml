models:
  - name: "ual_3_no2"
    sensor_bucket: "ual-minute-calibration"
    sensor_name: "ual-3"
    mqtt_topic: "sensors/ual-hour-inference/ual-3"
    model_name: "NO2_ual-3"
    model_version: "1"
    inputs:
      - RAW_ADC_NO2_W
      - RAW_ADC_NO2_A
      - RAW_ADC_NO_W
      - RAW_ADC_NO_A
      - RAW_ADC_O3_W
      - RAW_ADC_O3_A
      - sht_temp
      - sht_humid
    targets:
      - NO2

